<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참빛북클럽 챗봇 시뮬레이션</title>
    <style>
        /* 카카오톡 스타일 CSS */
        body {
            background-color: #f0f0f0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .phone-container {
            width: 375px;
            height: 700px;
            background-color: #abc1d1; /* 카카오톡 기본 배경색 */
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: #a9bdce;
            padding: 15px;
            display: flex;
            align-items: center;
            color: #3b3b3b;
            font-weight: bold;
            font-size: 16px;
            z-index: 10;
        }

        .header-icon {
            width: 30px;
            height: 30px;
            background-color: #fff;
            border-radius: 10px;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #3c1e1e;
        }

        .chat-screen {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 메시지 말풍선 스타일 */
        .msg-row {
            display: flex;
            width: 100%;
        }

        .msg-row.bot {
            justify-content: flex-start;
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            background-color: #fff;
            border-radius: 15px;
            margin-right: 10px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/4712/4712109.png'); /* 봇 아이콘 */
            background-size: cover;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            max-width: 70%;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bot .bubble {
            background-color: #ffffff;
            color: #000;
            border-top-left-radius: 0;
        }

        .user .bubble {
            background-color: #ffeb33; /* 카카오 노란색 */
            color: #000;
            border-top-right-radius: 0;
        }

        /* 카드형 메시지 (버튼 포함) */
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            width: 220px;
            margin-left: 50px; /* 프로필 이미지 공간 확보 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card-img {
            width: 100%;
            height: 120px;
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #888;
            font-size: 30px;
        }

        .card-body {
            padding: 15px;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .card-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
        }

        .card-btn {
            display: block;
            width: 100%;
            padding: 10px 0;
            text-align: center;
            background-color: #f5f5f5;
            border: none;
            border-top: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }
        
        .card-btn:hover {
            background-color: #e0e0e0;
        }

        /* 하단 메뉴 영역 */
        .input-area {
            background-color: #fff;
            padding: 10px;
            border-top: 1px solid #eee;
        }

        .quick-replies {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 10px;
        }

        .quick-replies::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background-color: #3c1e1e;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }

        .chip:hover {
            opacity: 0.9;
        }

        /* 로딩 애니메이션 */
        .typing-indicator {
            font-size: 12px;
            color: #888;
            margin-left: 55px;
            margin-bottom: 10px;
            display: none;
        }

    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <div class="header-icon">Ch</div>
            참빛북클럽 고객센터
        </div>

        <div class="chat-screen" id="chatScreen">
            <div class="msg-row bot">
                <div class="profile-img"></div>
                <div class="bubble">
                    안녕하세요, 원장님! 👋<br>
                    참빛북클럽 AI 상담원입니다.<br><br>
                    무엇을 도와드릴까요? 아래 버튼을 눌러주세요.
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typing">입력 중...</div>

        <div class="input-area">
            <div class="quick-replies" id="quickReplies">
                </div>
        </div>
    </div>

    <script>
        // 시나리오 데이터
        const scenarios = {
            'start': {
                buttons: ['로그인/계정 문의', '화면/오류 해결', '원격지원 요청', 'CS 접수']
            },
            '로그인/계정 문의': {
                msg: '로그인 문제로 불편하시군요. 😥\n가장 비슷한 상황을 선택해주세요.',
                buttons: ['비밀번호를 잊었어요', '학생 ID가 기억 안 나요', '처음으로']
            },
            '비밀번호를 잊었어요': {
                msg: '개인정보 보호를 위해 비밀번호 확인은 불가능하며, [초기화]만 가능합니다.\n\n초기화 후 기본 비번(1234)으로 변경해 드릴까요?',
                buttons: ['네, 초기화 해주세요', '아니요, 괜찮습니다']
            },
            '네, 초기화 해주세요': {
                msg: '네, 알겠습니다. 초기화할 학생의 [이름]과 [ID]를 입력해주시면 담당자가 처리 후 알림톡을 보내드리겠습니다.',
                type: 'input_request', // 시뮬레이션상 종료
                buttons: ['처음으로']
            },
            '화면/오류 해결': {
                msg: '화면이 깨지거나 소리가 안 나나요?\n먼저 확인이 필요합니다.\n\n혹시 인터넷 익스플로러(IE)를 사용 중이신가요?',
                buttons: ['네, IE 쓰고 있어요', '아니요, 크롬(Chrome) 써요', '처음으로']
            },
            '네, IE 쓰고 있어요': {
                msg: '참빛북클럽은 [크롬 브라우저]에 최적화되어 있습니다.\nIE에서는 오류가 발생할 수 있어요.\n\n아래 버튼을 눌러 크롬 설치 방법을 확인해보세요!',
                type: 'card',
                cardData: {
                    title: '크롬 브라우저 설치 안내',
                    text: '안정적인 학습을 위해 크롬 설치가 필수입니다.',
                    btnText: '설치 링크 보내주세요'
                },
                buttons: ['설치 링크 받기', '처음으로']
            },
            '아니요, 크롬(Chrome) 써요': {
                msg: '크롬인데도 오류가 발생한다면, 원격 지원으로 직접 봐드려야 할 것 같습니다.',
                buttons: ['원격지원 요청', '처음으로']
            },
            '원격지원 요청': {
                msg: '원활한 상담을 위해 원격지원을 시작합니다.\n\n1. PC 인터넷 주소창에 [367.co.kr] 입력\n2. 상담원 안내에 따라 접속 번호 입력\n\n준비 되셨나요?',
                buttons: ['사이트 접속 완료', '처음으로']
            },
            '사이트 접속 완료': {
                msg: '감사합니다. 상담원을 연결해 드리고 있습니다. 잠시만 기다려주세요... (연결 시뮬레이션 종료)',
                buttons: ['처음으로']
            },
            'CS 접수': {
                msg: '전화 연결이 어려우신가요? 📝\n접수 내용을 남겨주시면 담당자가 확인 후 연락드립니다.\n\n어떤 문제인가요?',
                buttons: ['배송/도서 파손', '결제/미납 문의', '기타 문의']
            }
        };

        const chatScreen = document.getElementById('chatScreen');
        const quickReplies = document.getElementById('quickReplies');
        const typingIndicator = document.getElementById('typing');

        // 초기 버튼 로드
        updateButtons(scenarios['start'].buttons);

        // 메시지 추가 함수
        function addMessage(text, sender, type = 'text', cardData = null) {
            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;

            if (sender === 'bot') {
                const profile = document.createElement('div');
                profile.className = 'profile-img';
                row.appendChild(profile);
            }

            if (type === 'text') {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerText = text;
                row.appendChild(bubble);
            } else if (type === 'card' && cardData) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img">🖥️</div>
                    <div class="card-body">
                        <div class="card-title">${cardData.title}</div>
                        <div class="card-text">${cardData.text}</div>
                    </div>
                    <button class="card-btn">${cardData.btnText}</button>
                `;
                row.appendChild(card);
            }

            chatScreen.appendChild(row);
            chatScreen.scrollTop = chatScreen.scrollHeight;
        }

        // 버튼 업데이트 함수
        function updateButtons(btnList) {
            quickReplies.innerHTML = '';
            btnList.forEach(btnText => {
                const btn = document.createElement('button');
                btn.className = 'chip';
                btn.innerText = btnText;
                btn.onclick = () => handleUserAction(btnText);
                quickReplies.appendChild(btn);
            });
        }

        // 유저 액션 처리
        function handleUserAction(actionText) {
            // 1. 유저 메시지 표시
            addMessage(actionText, 'user');
            
            // 2. 버튼 숨기기 (처리 중 느낌)
            quickReplies.innerHTML = '';
            
            // 3. 로딩 표시 및 봇 응답
            typingIndicator.style.display = 'block';

            setTimeout(() => {
                typingIndicator.style.display = 'none';
                
                let nextScenario = scenarios[actionText];
                
                // "처음으로" 로직
                if(actionText === '처음으로') {
                    nextScenario = scenarios['start'];
                    addMessage("메인 메뉴로 돌아갑니다.", 'bot');
                } else if (nextScenario) {
                    // 봇 텍스트 응답
                    addMessage(nextScenario.msg, 'bot');
                    
                    // 카드형 메시지가 있다면 추가 출력
                    if (nextScenario.type === 'card') {
                        setTimeout(() => {
                             addMessage('', 'bot', 'card', nextScenario.cardData);
                        }, 500);
                    }
                } else {
                    // 시나리오에 없는 경우 (기타/종료 등)
                    addMessage("접수가 완료되었습니다. 담당자가 확인하겠습니다.", 'bot');
                    updateButtons(['처음으로']);
                    return;
                }

                // 다음 버튼 로드
                if (nextScenario && nextScenario.buttons) {
                    updateButtons(nextScenario.buttons);
                }

            }, 800); // 0.8초 딜레이
        }
    </script>
</body>
</html>
