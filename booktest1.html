<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응형 레이아웃 리뉴얼</title>
    <style>
        /* 1. 기본 초기화 (Reset) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* 패딩이 너비에 영향을 주지 않도록 설정 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }

        /* 2. 공통 레이아웃 */
        .container {
            width: 100%;
            max-width: 1200px; /* PC 환경에서의 최대 너비 제한 */
            margin: 0 auto;
            display: flex;
            flex-direction: column; /* 모바일에서는 세로가 기본 */
            min-height: 100vh;
        }

        /* 3. 헤더 (Header) */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        /* 4. 메인 콘텐츠 영역 (Main & Sidebar) */
        .wrapper {
            display: flex;
            flex-direction: column; /* 모바일: 세로 배치 */
            flex: 1;
        }

        main {
            background: white;
            padding: 2rem;
            flex: 3; /* PC에서 더 넓은 면적 차지 */
        }

        aside {
            background: #ecf0f1;
            padding: 2rem;
            flex: 1;
        }

        /* 5. 푸터 (Footer) */
        footer {
            background: #333;
            color: #ccc;
            text-align: center;
            padding: 1rem;
            font-size: 0.9rem;
        }

        /* 6. 핵심: 미디어 쿼리 (데스크탑 설정) */
        /* 화면 너비가 768px 이상일 때 적용될 스타일 */
        @media (min-width: 768px) {
            .wrapper {
                flex-direction: row; /* PC: 가로 배치로 변경 */
            }

            header {
                text-align: left;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            main {
                border-right: 1px solid #ddd;
            }
        }

        /* 카드 형태의 콘텐츠 예시 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Brand</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Services</a>
                <a href="#">About</a>
            </nav>
        </header>

        <div class="wrapper">
            <main>
                <h2>반응형 리뉴얼 메인</h2>
                <p>화면 크기를 줄여보세요! 사이드바가 아래로 이동하고 헤더 정렬이 바뀝니다.</p>
                
                <div class="card-grid">
                    <div class="card">아이템 1</div>
                    <div class="card">아이템 2</div>
                    <div class="card">아이템 3</div>
                </div>
            </main>

            <aside>
                <h3>사이드바</h3>
                <ul>
                    <li>최신 글 목록</li>
                    <li>인기 카테고리</li>
                </ul>
            </aside>
        </div>

        <footer>
            <p>&copy; 2026 Responsive Web Design. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
